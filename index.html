<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SupplierEval Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:#f5f4f0;color:#1a1a1a;min-height:100vh}
.topbar{background:#D85A30;padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:10px}
.brand-icon{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:17px}
.brand-name{font-size:15px;font-weight:600;color:#fff}
.brand-sub{font-size:10px;color:rgba(255,255,255,0.7)}
.nav{display:flex;gap:4px}
.nav-btn{padding:5px 13px;border-radius:999px;font-size:12px;font-family:'Sarabun',sans-serif;cursor:pointer;border:none;background:transparent;color:rgba(255,255,255,0.75)}
.nav-btn.active,.nav-btn:hover{background:rgba(255,255,255,0.2);color:#fff}
.key-bar{background:#fff7f2;border-bottom:1px solid #f0c5a0;padding:7px 20px;display:flex;align-items:center;gap:8px}
.key-bar label{font-size:12px;color:#993C1D;white-space:nowrap}
.key-bar input{flex:1;max-width:320px;padding:5px 10px;border:1px solid #f0c5a0;border-radius:6px;font-size:12px;font-family:'Sarabun',sans-serif;color:#4A1B0C;background:#fff}
.key-bar input:focus{outline:none;border-color:#D85A30}
.key-status{font-size:11px;padding:3px 10px;border-radius:999px}
.key-ok{background:#EAF3DE;color:#27500A}
.key-no{background:#FAECE7;color:#993C1D}
.main{display:grid;grid-template-columns:1fr 320px;min-height:calc(100vh - 94px)}
.form-panel{padding:20px;overflow-y:auto}
.result-panel{background:#fff;border-left:1px solid #f0e8e0;padding:18px;display:flex;flex-direction:column;gap:14px;overflow-y:auto}
.sec-label{font-size:12px;font-weight:600;color:#993C1D;letter-spacing:.04em;margin-bottom:10px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
.field{display:flex;flex-direction:column;gap:3px}
.field label{font-size:11px;color:#888;font-weight:500}
.field input,.field select{padding:7px 10px;border:1px solid #e0dbd4;border-radius:8px;font-size:13px;font-family:'Sarabun',sans-serif;background:#fff;color:#1a1a1a}
.field input:focus,.field select:focus{outline:none;border-color:#D85A30}
.crit-card{background:#fff;border:1px solid #f0e8e0;border-radius:10px;padding:11px 13px;margin-bottom:8px}
.crit-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.crit-name{font-size:13px;font-weight:500}
.crit-wt{font-size:10px;color:#D85A30;background:#fff7f2;padding:2px 8px;border-radius:999px}
.crit-row{display:flex;align-items:center;gap:10px}
.crit-slider{flex:1;-webkit-appearance:none;height:5px;border-radius:3px;background:#f0e4dc;cursor:pointer;outline:none}
.crit-slider::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:#D85A30;cursor:pointer;border:3px solid #fff;box-shadow:0 0 0 1px #D85A30}
.crit-slider::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:#D85A30;cursor:pointer;border:3px solid #fff}
.crit-val{font-size:16px;font-weight:700;color:#D85A30;min-width:22px;text-align:right}
.crit-desc{font-size:11px;color:#bbb;margin-top:3px}
.remark{width:100%;padding:9px 10px;border:1px solid #e0dbd4;border-radius:8px;font-size:13px;font-family:'Sarabun',sans-serif;resize:vertical;min-height:64px;margin-bottom:16px;color:#1a1a1a}
.remark:focus{outline:none;border-color:#D85A30}
.eval-btn{width:100%;padding:13px;background:#D85A30;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;font-family:'Sarabun',sans-serif;cursor:pointer;transition:background .15s}
.eval-btn:hover{background:#b84a24}
.eval-btn:active{transform:scale(.98)}
.score-wrap{text-align:center;padding:10px 0 4px}
.score-ring{width:90px;height:90px;border-radius:50%;border:4px solid #e0dbd4;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 8px;transition:border-color .4s}
.score-ring.high{border-color:#639922}
.score-ring.mid{border-color:#EF9F27}
.score-ring.low{border-color:#E24B4A}
.score-num{font-size:30px;font-weight:700;line-height:1}
.score-denom{font-size:11px;color:#aaa}
.v-pill{display:inline-block;padding:4px 14px;border-radius:999px;font-size:12px;font-weight:600}
.v-approved{background:#EAF3DE;color:#27500A}
.v-conditional{background:#FAEEDA;color:#633806}
.v-rejected{background:#FCEBEB;color:#791F1F}
.bk-box{background:#f9f7f4;border-radius:10px;padding:11px 13px}
.bk-title{font-size:11px;font-weight:600;color:#aaa;margin-bottom:8px;letter-spacing:.04em}
.bk-row{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.bk-lbl{font-size:12px;color:#555;flex:1}
.bk-bar{flex:2;height:5px;background:#e8e4dc;border-radius:3px;overflow:hidden}
.bk-fill{height:100%;background:#D85A30;border-radius:3px;transition:width .5s}
.bk-sc{font-size:11px;font-weight:600;color:#D85A30;min-width:26px;text-align:right}
.radar-wrap{background:#fff;border:1px solid #f0e8e0;border-radius:10px;padding:10px;text-align:center}
.ai-box{background:#fff7f2;border:1px solid #f0c5a0;border-radius:10px;padding:12px}
.ai-head{display:flex;align-items:center;gap:6px;margin-bottom:7px}
.ai-dot{width:8px;height:8px;border-radius:50%;background:#ccc}
.ai-dot.pulse{background:#D85A30;animation:pulse 1.2s infinite}
.ai-dot.done{background:#639922;animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.ai-lbl{font-size:12px;font-weight:600;color:#993C1D}
.ai-text{font-size:13px;color:#4A1B0C;line-height:1.7}
.ai-hint{font-size:12px;color:#bbb;font-style:italic}
.exp-row{display:flex;gap:6px}
.exp-btn{flex:1;padding:8px;border:1px solid #e0dbd4;border-radius:8px;font-size:12px;font-family:'Sarabun',sans-serif;color:#666;background:#fff;cursor:pointer}
.exp-btn:hover{border-color:#D85A30;color:#D85A30}
#page-history,#page-compare{display:none;padding:20px}
.pg-title{font-size:15px;font-weight:600;margin-bottom:14px}
.empty-msg{text-align:center;padding:50px 20px;color:#bbb;font-size:14px}
.hist-card{background:#fff;border:1px solid #f0e8e0;border-radius:10px;padding:13px;margin-bottom:8px;cursor:pointer}
.hist-card:hover{border-color:#D85A30}
.hist-top{display:flex;justify-content:space-between;align-items:flex-start}
.hist-name{font-size:14px;font-weight:600}
.hist-meta{font-size:11px;color:#aaa;margin-top:2px}
.hist-score{font-size:22px;font-weight:700;color:#D85A30;text-align:right}
.cmp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.cmp-card{background:#fff;border:1px solid #f0e8e0;border-radius:10px;padding:13px;text-align:center}
.cmp-name{font-size:13px;font-weight:600;margin-bottom:3px}
.cmp-score{font-size:28px;font-weight:700;color:#D85A30}
.cmp-row{display:flex;justify-content:space-between;font-size:11px;color:#888;padding:2px 0}
.cmp-row span:last-child{color:#D85A30;font-weight:600}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="brand-icon">📊</div>
    <div>
      <div class="brand-name">SupplierEval Pro</div>
      <div class="brand-sub">AI-Powered Supplier Scoring</div>
    </div>
  </div>
  <div class="nav">
    <button class="nav-btn active" onclick="showPage('eval')">ประเมินใหม่</button>
    <button class="nav-btn" onclick="showPage('history')">ประวัติ (<span id="hist-count">0</span>)</button>
    <button class="nav-btn" onclick="showPage('compare')">เปรียบเทียบ</button>
  </div>
</div>

<div class="key-bar">
  <label>🔑 API Key (ไม่บังคับ):</label>
  <input type="password" id="api-key" placeholder="sk-ant-... (ถ้าไม่มีระบบใช้ตัวอย่างแทน)" oninput="checkKey()">
  <span class="key-status key-no" id="key-status">ไม่มี key — ใช้ข้อความตัวอย่าง</span>
</div>

<div id="page-eval">
  <div class="main">
    <div class="form-panel">
      <div class="sec-label">ข้อมูล Supplier</div>
      <div class="info-grid">
        <div class="field"><label>ชื่อบริษัท</label><input id="f-name" type="text" placeholder="เช่น บ.ไทยโลจิสติกส์ จำกัด"></div>
        <div class="field"><label>ประเภท</label>
          <select id="f-type">
            <option>3PL / ขนส่ง</option><option>ผู้ผลิต / วัตถุดิบ</option>
            <option>คลังสินค้า / Warehouse</option><option>IT / Software</option><option>อื่นๆ</option>
          </select>
        </div>
        <div class="field"><label>ประเทศ</label><input id="f-country" type="text" placeholder="ไทย"></div>
        <div class="field"><label>ปีที่เริ่มร่วมงาน</label><input id="f-year" type="number" placeholder="2022" min="2000" max="2030"></div>
      </div>
      <div class="sec-label">เกณฑ์การประเมิน (1 = น้อยที่สุด → 5 = ดีที่สุด)</div>
      <div id="crit-list"></div>
      <div class="sec-label" style="margin-top:4px">หมายเหตุ</div>
      <textarea class="remark" id="f-remark" placeholder="บันทึกข้อสังเกตเพิ่มเติม..."></textarea>
      <button class="eval-btn" onclick="runEval()">🤖 ประเมินและให้ AI วิเคราะห์</button>
    </div>

    <div class="result-panel">
      <div class="score-wrap">
        <div class="score-ring" id="score-ring">
          <div class="score-num" id="score-num">—</div>
          <div class="score-denom">/ 100</div>
        </div>
        <div id="verdict-wrap" style="margin-top:4px"></div>
      </div>
      <div class="bk-box">
        <div class="bk-title">คะแนนแต่ละเกณฑ์</div>
        <div id="bk-rows"><div style="font-size:12px;color:#ccc;text-align:center;padding:8px">กดประเมินเพื่อดูผล</div></div>
      </div>
      <div class="radar-wrap">
        <svg id="radar-svg" viewBox="0 0 220 195" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-height:195px">
          <text x="110" y="100" text-anchor="middle" font-size="12" fill="#ccc" font-family="Sarabun,sans-serif">กดประเมินเพื่อดู Radar Chart</text>
        </svg>
      </div>
      <div class="ai-box">
        <div class="ai-head">
          <div class="ai-dot" id="ai-dot"></div>
          <div class="ai-lbl">AI Analysis</div>
        </div>
        <div id="ai-out"><div class="ai-hint">กดประเมินเพื่อรับผลวิเคราะห์</div></div>
      </div>
      <div class="exp-row">
        <button class="exp-btn" onclick="doExportTxt()">📄 Export .txt</button>
        <button class="exp-btn" onclick="doExportCSV()">📊 Export .csv</button>
      </div>
    </div>
  </div>
</div>

<div id="page-history">
  <div class="pg-title">ประวัติการประเมิน</div>
  <div id="hist-list"></div>
</div>

<div id="page-compare">
  <div class="pg-title">เปรียบเทียบ Supplier</div>
  <div id="cmp-grid" class="cmp-grid"></div>
</div>

<script>
var CRIT = [
  {key:'price',   name:'ราคา / ต้นทุน',       wt:20, desc:'ความสามารถแข่งขันด้านราคา'},
  {key:'quality', name:'คุณภาพสินค้า/บริการ', wt:25, desc:'มาตรฐานและความสม่ำเสมอ'},
  {key:'delivery',name:'ตรงเวลา / On-time',    wt:20, desc:'ความน่าเชื่อถือในการส่งมอบ'},
  {key:'comms',   name:'การสื่อสาร',            wt:15, desc:'การตอบสนองและความโปร่งใส'},
  {key:'flex',    name:'ความยืดหยุ่น',         wt:10, desc:'ปรับตัวตามความต้องการได้'},
  {key:'cert',    name:'มาตรฐาน/ใบรับรอง',     wt:10, desc:'ISO, GMP หรือใบรับรองอื่นๆ'},
];

var history = [];
try { history = JSON.parse(localStorage.getItem('se_v2') || '[]'); } catch(e){}
document.getElementById('hist-count').textContent = history.length;

function buildForm() {
  var html = '';
  CRIT.forEach(function(c) {
    html += '<div class="crit-card">' +
      '<div class="crit-top">' +
        '<div class="crit-name">' + c.name + '</div>' +
        '<div class="crit-wt">น้ำหนัก ' + c.wt + '%</div>' +
      '</div>' +
      '<div class="crit-row">' +
        '<input type="range" class="crit-slider" id="sl-' + c.key + '" min="1" max="5" value="3" ' +
        'oninput="document.getElementById(\'sv-' + c.key + '\').textContent=this.value">' +
        '<div class="crit-val" id="sv-' + c.key + '">3</div>' +
      '</div>' +
      '<div class="crit-desc">' + c.desc + '</div>' +
    '</div>';
  });
  document.getElementById('crit-list').innerHTML = html;
}

function getScores() {
  return CRIT.map(function(c) {
    var el = document.getElementById('sl-' + c.key);
    return { key:c.key, name:c.name, wt:c.wt, score: el ? parseInt(el.value)||3 : 3 };
  });
}

function calcTotal(scores) {
  return scores.reduce(function(s,c){ return s + (c.score/5)*c.wt; }, 0);
}

function getVerdict(t) {
  if (t >= 75) return {text:'Approved — ผ่านเกณฑ์',   cls:'v-approved',   ring:'high'};
  if (t >= 50) return {text:'Conditional — มีเงื่อนไข', cls:'v-conditional', ring:'mid'};
  return          {text:'Rejected — ไม่ผ่านเกณฑ์',    cls:'v-rejected',    ring:'low'};
}

function drawRadar(scores) {
  var cx=110, cy=100, r=62, n=scores.length;
  function pt(i, rad) {
    var a = (Math.PI*2*i/n) - Math.PI/2;
    return [cx + rad*Math.cos(a), cy + rad*Math.sin(a)];
  }
  function poly(rad, fill, stroke, sw, opacity) {
    var pts = [];
    for (var i=0;i<n;i++){var p=pt(i,rad);pts.push(p[0].toFixed(1)+','+p[1].toFixed(1));}
    return '<polygon points="'+pts.join(' ')+'" fill="'+(fill||'none')+'" '+(opacity?'fill-opacity="'+opacity+'" ':'')+
      'stroke="'+stroke+'" stroke-width="'+sw+'"/>';
  }
  var svg = poly(r,'none','#f0c5a0','1');
  svg += poly(r*0.67,'none','#f0c5a0','0.7');
  svg += poly(r*0.33,'none','#f0c5a0','0.5');
  for (var i=0;i<n;i++){var p=pt(i,r);svg+='<line x1="'+cx+'" y1="'+cy+'" x2="'+p[0].toFixed(1)+'" y2="'+p[1].toFixed(1)+'" stroke="#f0c5a0" stroke-width="0.7"/>';}
  var dpts=[];
  for (var i=0;i<n;i++){var p=pt(i,(scores[i].score/5)*r);dpts.push(p[0].toFixed(1)+','+p[1].toFixed(1));}
  svg+='<polygon points="'+dpts.join(' ')+'" fill="#D85A30" fill-opacity="0.18" stroke="#D85A30" stroke-width="2"/>';
  for (var i=0;i<n;i++){var p=pt(i,(scores[i].score/5)*r);svg+='<circle cx="'+p[0].toFixed(1)+'" cy="'+p[1].toFixed(1)+'" r="4" fill="#D85A30"/>';}
  for (var i=0;i<n;i++){
    var lp=pt(i,r+20);
    var anchor=lp[0]<cx-8?'end':lp[0]>cx+8?'start':'middle';
    svg+='<text x="'+lp[0].toFixed(1)+'" y="'+(lp[1]+4).toFixed(1)+'" text-anchor="'+anchor+
      '" font-size="10" fill="#993C1D" font-family="Sarabun,sans-serif">'+scores[i].name+'</text>';
  }
  document.getElementById('radar-svg').innerHTML = svg;
}

function updateBreakdown(scores) {
  var html='';
  scores.forEach(function(c){
    html+='<div class="bk-row"><div class="bk-lbl">'+c.name+'</div>'+
      '<div class="bk-bar"><div class="bk-fill" style="width:'+((c.score/5)*100)+'%"></div></div>'+
      '<div class="bk-sc">'+c.score+'/5</div></div>';
  });
  document.getElementById('bk-rows').innerHTML = html;
}

async function runEval() {
  var name   = (document.getElementById('f-name').value||'').trim()||'Supplier ไม่ระบุชื่อ';
  var type   = document.getElementById('f-type').value;
  var country= (document.getElementById('f-country').value||'').trim()||'ไม่ระบุ';
  var remark = (document.getElementById('f-remark').value||'').trim();
  var scores = getScores();
  var total  = Math.round(calcTotal(scores));
  var verdict= getVerdict(total);

  document.getElementById('score-num').textContent  = total;
  document.getElementById('score-ring').className   = 'score-ring '+verdict.ring;
  document.getElementById('verdict-wrap').innerHTML = '<span class="v-pill '+verdict.cls+'">'+verdict.text+'</span>';

  updateBreakdown(scores);
  drawRadar(scores);

  var dot = document.getElementById('ai-dot');
  dot.className = 'ai-dot pulse';
  document.getElementById('ai-out').innerHTML = '<div class="ai-hint">⏳ กำลังวิเคราะห์...</div>';

  var apiKey = (document.getElementById('api-key').value||'').trim();
  var aiText = '';

  if (apiKey && apiKey.indexOf('sk-ant-')===0) {
    try {
      var st = scores.map(function(c){return c.name+': '+c.score+'/5 (น้ำหนัก '+c.wt+'%)';}).join('\n');
      var prompt = 'คุณคือผู้เชี่ยวชาญ Supply Chain\nวิเคราะห์ผลประเมิน Supplier เป็นภาษาไทย 3-4 ประโยค:\n\nชื่อ: '+name+'\nประเภท: '+type+' | ประเทศ: '+country+'\nคะแนนรวม: '+total+'/100 ('+verdict.text+')\n\n'+st+(remark?'\nหมายเหตุ: '+remark:'')+'\n\nระบุ: 1) จุดแข็ง 2) จุดที่ต้องพัฒนา 3) คำแนะนำถัดไป';
      var res = await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:400,messages:[{role:'user',content:prompt}]})
      });
      var d = await res.json();
      aiText = (d.content&&d.content[0]&&d.content[0].text) ? d.content[0].text : 'ไม่สามารถรับผลจาก AI ได้';
    } catch(e) { aiText = '⚠️ เชื่อมต่อ API ไม่ได้: '+e.message; }
  } else {
    var weak   = scores.filter(function(c){return c.score<=3;}).map(function(c){return c.name;});
    var strong = scores.filter(function(c){return c.score>=4;}).map(function(c){return c.name;});
    aiText = '[ตัวอย่าง — ใส่ API Key เพื่อรับผลจาก Claude จริงๆ]\n\n'+
      name+' ได้คะแนนรวม '+total+'/100 ระดับ "'+verdict.text+'" '+
      (strong.length?'จุดแข็งด้าน'+strong.join(' และ')+' ':'')+
      (weak.length?'ควรพัฒนาด้าน'+weak.join(' และ')+' ':'')+
      'แนะนำจัดประชุม Business Review เพื่อวางแผนพัฒนาร่วมกันในไตรมาสถัดไป';
  }

  dot.className = 'ai-dot done';
  document.getElementById('ai-out').innerHTML = '<div class="ai-text">'+aiText.replace(/\n/g,'<br>')+'</div>';

  var rec = {name:name,type:type,country:country,total:total,verdict:verdict.text,scores:scores,aiText:aiText,date:new Date().toLocaleDateString('th-TH'),remark:remark};
  history.unshift(rec);
  try{localStorage.setItem('se_v2',JSON.stringify(history));}catch(e){}
  document.getElementById('hist-count').textContent = history.length;
}

function checkKey() {
  var k=(document.getElementById('api-key').value||'').trim();
  var st=document.getElementById('key-status');
  if (k.indexOf('sk-ant-')===0){st.className='key-status key-ok';st.textContent='✓ API Key พร้อมใช้งาน';}
  else{st.className='key-status key-no';st.textContent='ไม่มี key — ใช้ข้อความตัวอย่าง';}
}

function showPage(p) {
  ['eval','history','compare'].forEach(function(x){
    var el=document.getElementById('page-'+x);
    if(el) el.style.display=(x===p)?'block':'none';
  });
  document.querySelectorAll('.nav-btn').forEach(function(b,i){
    b.classList.toggle('active',['eval','history','compare'][i]===p);
  });
  if(p==='history') renderHistory();
  if(p==='compare') renderCompare();
}

function renderHistory() {
  var el=document.getElementById('hist-list');
  if(!history.length){el.innerHTML='<div class="empty-msg">ยังไม่มีประวัติ — กดประเมินก่อนเลยครับ</div>';return;}
  el.innerHTML=history.map(function(r,i){
    return '<div class="hist-card" onclick="loadRec('+i+')">'+
      '<div class="hist-top"><div><div class="hist-name">'+r.name+'</div>'+
      '<div class="hist-meta">'+r.type+' · '+r.country+' · '+r.date+'</div></div>'+
      '<div><div class="hist-score">'+r.total+'</div><div style="font-size:10px;color:#aaa;text-align:right">/ 100</div></div></div>'+
      '<div style="margin-top:7px"><span class="v-pill '+(r.total>=75?'v-approved':r.total>=50?'v-conditional':'v-rejected')+'">'+r.verdict+'</span></div>'+
      '</div>';
  }).join('');
}

function renderCompare() {
  var el=document.getElementById('cmp-grid');
  if(!history.length){el.innerHTML='<div class="empty-msg">ประเมิน Supplier อย่างน้อย 2 รายก่อนนะครับ</div>';return;}
  el.innerHTML=history.map(function(r){
    return '<div class="cmp-card">'+
      '<div class="cmp-name">'+r.name+'</div>'+
      '<div style="font-size:11px;color:#aaa;margin-bottom:6px">'+r.type+'</div>'+
      '<div class="cmp-score">'+r.total+'</div>'+
      '<div style="margin:5px 0"><span class="v-pill '+(r.total>=75?'v-approved':r.total>=50?'v-conditional':'v-rejected')+'" style="font-size:10px">'+r.verdict+'</span></div>'+
      '<div class="cmp-rows">'+r.scores.map(function(c){return '<div class="cmp-row"><span>'+c.name+'</span><span>'+c.score+'/5</span></div>';}).join('')+'</div>'+
      '</div>';
  }).join('');
}

function loadRec(i) {
  var r=history[i]; showPage('eval');
  document.getElementById('f-name').value=r.name;
  document.getElementById('f-type').value=r.type;
  document.getElementById('f-country').value=r.country;
  if(r.remark) document.getElementById('f-remark').value=r.remark;
  r.scores.forEach(function(c){
    var sl=document.getElementById('sl-'+c.key);
    var sv=document.getElementById('sv-'+c.key);
    if(sl) sl.value=c.score;
    if(sv) sv.textContent=c.score;
  });
}

function doExportTxt() {
  var name=document.getElementById('f-name').value||'Supplier';
  var scores=getScores(); var total=Math.round(calcTotal(scores));
  var ai=document.getElementById('ai-out').innerText||'-';
  var lines=['SupplierEval Pro — รายงานผลประเมิน',
    'วันที่: '+new Date().toLocaleDateString('th-TH'),
    'Supplier: '+name,'ประเภท: '+document.getElementById('f-type').value,
    'ประเทศ: '+(document.getElementById('f-country').value||'-'),'',
    'คะแนนรวม: '+total+'/100','ผลประเมิน: '+getVerdict(total).text,'',
    'คะแนนแต่ละเกณฑ์:'].concat(scores.map(function(c){return '  '+c.name+': '+c.score+'/5 ('+c.wt+'%)';})).concat(['','AI Analysis:',ai]);
  var blob=new Blob([lines.join('\n')],{type:'text/plain;charset=utf-8'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='supplier_eval_'+name.replace(/\s/g,'_')+'.txt';a.click();
}

function doExportCSV() {
  var name=document.getElementById('f-name').value||'Supplier';
  var scores=getScores(); var total=Math.round(calcTotal(scores));
  var rows=[
    ['ชื่อ Supplier','ประเภท','ประเทศ','คะแนนรวม','ผลประเมิน'].concat(scores.map(function(c){return c.name;})).concat(['วันที่']),
    [name,document.getElementById('f-type').value,document.getElementById('f-country').value||'-',total,getVerdict(total).text].concat(scores.map(function(c){return c.score;})).concat([new Date().toLocaleDateString('th-TH')])
  ];
  var blob=new Blob(['\ufeff'+rows.map(function(r){return r.join(',');}).join('\n')],{type:'text/csv;charset=utf-8'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='supplier_eval_'+name.replace(/\s/g,'_')+'.csv';a.click();
}

buildForm();
</script>
</body>
</html>
